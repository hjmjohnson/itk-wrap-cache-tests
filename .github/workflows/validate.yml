name: validate

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      itk-ref:
        description: "ITK ref to validate (branch, tag, or SHA)"
        default: "enh/igenerator-sqlite-pkl"
      itk-repo:
        description: "ITK repository"
        default: "hjmjohnson/ITK"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2022]
        python: ["3.11", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.itk-repo || 'hjmjohnson/ITK' }}
          ref: ${{ github.event.inputs.itk-ref || 'enh/igenerator-sqlite-pkl' }}
          path: ITK
          sparse-checkout: |
            Wrapping/Generators
          sparse-checkout-cone-mode: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - run: pip install pytest

      - name: Run suite
        env:
          ITK_SOURCE_DIR: ${{ github.workspace }}/ITK
        run: python -m pytest
